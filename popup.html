<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font: 13px/1.5 system-ui, -apple-system, sans-serif;
      width: 300px;
      padding: 12px;
      margin: 0;
      color: #333;
    }
    h1 { font-size: 14px; margin: 0 0 8px; }
    .tauri-status {
      font-size: 11px;
      margin-bottom: 10px;
      color: #666;
    }
    .tauri-status.online { color: #16a34a; }
    .tauri-status.offline { color: #dc2626; }

    .add-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .add-row input {
      flex: 1;
      padding: 5px 8px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .add-row button {
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
    }
    .add-row button:hover { background: #eee; }
    .error { color: #dc2626; font-size: 11px; margin-top: 2px; }

    .site-list {
      max-height: 180px;
      overflow: auto;
      border: 1px solid #e5e5e5;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .site-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-bottom: 1px solid #f0f0f0;
    }
    .site-item:last-child { border-bottom: none; }
    .site-item input[type="checkbox"] { margin: 0; }
    .site-info { flex: 1; min-width: 0; }
    .site-hostname {
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .site-meta {
      font-size: 10px;
      color: #888;
    }
    .site-item .del {
      font-size: 11px;
      color: #999;
      cursor: pointer;
      border: none;
      background: none;
      padding: 2px 4px;
    }
    .site-item .del:hover { color: #dc2626; }
    .more-btn {
      width: 100%;
      padding: 6px;
      font-size: 12px;
      color: #666;
      cursor: pointer;
      border: none;
      background: #fafafa;
      border-top: 1px solid #f0f0f0;
    }
    .more-btn:hover { background: #f0f0f0; }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .sync-btn {
      flex: 1;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
    }
    .sync-btn:hover { background: #eee; }

    .log {
      max-height: 120px;
      overflow: auto;
      font: 11px ui-monospace, monospace;
      color: #555;
      border-top: 1px solid #e5e5e5;
      padding-top: 6px;
    }
    .log .ok { color: #16a34a; }
    .log .err { color: #dc2626; }
  </style>
</head>
<body>
  <h1>Cookie Bridge</h1>
  <div id="tauri-status" class="tauri-status">检测中...</div>

  <div class="add-row">
    <input id="url-input" type="text" placeholder="https://example.com/" />
    <button id="add-btn">+ 添加</button>
  </div>
  <div id="add-error" class="error"></div>

  <div id="site-list" class="site-list"></div>

  <div class="btn-row">
    <button id="sync-all" class="sync-btn">立即同步全部</button>
    <button id="copy-account" class="sync-btn">前端 account</button>
  </div>

  <div id="log" class="log"></div>

  <script src="popup.js" type="module"></script>
</body>
</html>
